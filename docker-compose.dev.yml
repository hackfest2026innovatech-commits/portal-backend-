version: "3.9"

# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  mongo:
    ports:
      - "27017:27017"

  server:
    build:
      context: ./server
      dockerfile: ../Dockerfile.server
      target: development
    container_name: hackathon-server-dev
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/hackathon-portal
    command: npx nodemon --legacy-watch server.js

  client:
    build:
      context: ./client
      dockerfile: ../Dockerfile.client
      target: development
    container_name: hackathon-client-dev
    ports:
      - "5173:5173"
      - "80"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
      - VITE_SOCKET_URL=http://localhost:5000
    command: npm run dev -- --host 0.0.0.0
